<style>
    :root {
        --bg: #ECF8F8; /* light base color */
        --text: #1D8A7A; /* darkest teal for text */
    }

    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: var(--bg);
        font-family: 'Inter', sans-serif;
        overflow: hidden;
    }

    /* THE ANIMATED MESH */
    .mesh-bg {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: -1;
        /* palette across multiple moving blobs */
        background-color: var(--bg);
        background-image: 
            radial-gradient(at 0% 0%, #22E1DF 0px, transparent 50%),
            radial-gradient(at 100% 0%, #1FDCD2 0px, transparent 50%),
            radial-gradient(at 100% 100%, #70C2BD 0px, transparent 50%),
            radial-gradient(at 0% 100%, #45B2AB 0px, transparent 50%),
            radial-gradient(at 50% 50%, #19A99F 0px, transparent 50%);
        background-size: 200% 200%;
        filter: blur(40px);
        animation: meshFlow 12s ease-in-out infinite alternate;
    }

    @keyframes meshFlow {
        0% { background-position: 0% 0%; }
        50% { background-position: 100% 100%; }
        100% { background-position: 0% 100%; }
    }

    /* content Overlay */
    .container {
        position: relative; z-index: 1;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100vh; text-align: center;
        background: rgba(236, 248, 248, 0.2); /* glassmorphism touch */
        backdrop-filter: blur(10px);
    }

    h1 { 
        font-family: 'Playfair Display', serif; font-size: 3.5rem; 
        margin: 10px 0; color: #1D8A7A; 
    }
    
    p { font-size: 1.1rem; color: #298A90; margin-bottom: 40px; }

    .badge { 
        border: 1px solid #1D8A7A; padding: 5px 15px; 
        font-size: 0.7rem; color: #1D8A7A; 
        letter-spacing: 2px; text-transform: uppercase; 
    }

    .contact-box a { 
        display: block; color: #298A90; text-decoration: none; 
        margin: 8px 0; font-weight: 500; transition: 0.3s;
    }

    .contact-box a:hover { color: #22E1DF; transform: translateX(5px); }
</style>

<body>
    <div class="mesh-bg"></div>
    <div class="container">
        <div class="badge">Digital Space Coming Soon</div>
        <h1>Tisha Sharma</h1>
        <p>Full-Stack Web Developer</p>
        <div class="contact-box">
            <a href="mailto:hello@tishasharma.in">hello@tishasharma.in</a>
            <a href="mailto:contact@tishasharma.in">contact@tishasharma.in</a>
            <a href="mailto:hie@tishasharma.in">hie@tishasharma.in</a>
        </div>
    </div>
</body>
