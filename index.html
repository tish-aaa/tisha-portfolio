        </div>
      </div>
    </div>

<script>
let rotation = 0;
const image = document.getElementById('earth360Rotate');

window.addEventListener('wheel', (event) => {
    // Standardize scroll speed across different trackpads/mice
    const delta = Math.sign(event.deltaY);
    
    // Smoothly accumulate rotation steps
    rotation += delta * 1.5; 
    
    // Apply the seamless rotation
    image.style.transform = `rotate(${rotation}deg)`;
});
</script>
